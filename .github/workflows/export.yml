name: "Export Game"
on:
  push:
    branches:
      - main
      - master

jobs:
  export:
    name: Export Game
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java (for Android export)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: Generate Android Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore ~/.android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 365

      - name: Configure Godot Editor Settings (Android SDK Path)
        run: |
          mkdir -p ~/.config/godot
          cat <<EOF > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          EOF
          cp ~/.config/godot/editor_settings-4.tres ~/.config/godot/editor_settings-4.6.tres

      - name: Create Build Directories
        run: |
          mkdir -p build/windows
          mkdir -p build/linux
          mkdir -p build/mac
          mkdir -p build/web
          mkdir -p build/android
          mkdir -p build/ios

      - name: Export Windows
        run: |
          godot --headless --export-release "Windows Desktop" build/windows/slash_block.exe

      - name: Export Linux
        run: |
          godot --headless --export-release "Linux" build/linux/slash_block.x86_64

      - name: Export macOS
        run: |
          godot --headless --export-release "macOS" build/mac/slash_block.zip

      - name: Export HTML5 Web
        run: |
          godot --headless --export-release "Web" build/web/index.html

      - name: Export Android
        run: |
          godot --headless --export-debug "Android" build/android/slash_block.apk

      - name: Export iOS (Xcode Project)
        run: |
          godot --headless --export-release "iOS" build/ios/xcode_project

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: slash-block-windows
          path: build/windows/

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: slash-block-linux
          path: build/linux/

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: slash-block-mac
          path: build/mac/

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: slash-block-web
          path: build/web/

      - name: Upload Android Build
        uses: actions/upload-artifact@v4
        with:
          name: slash-block-android
          path: build/android/

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: slash-block-ios
          path: build/ios/
